name: Cargo Build & Test

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  HTSLIB_VERSION: 1.23.1
  LIBDEFLATE_VERSION: 1.25
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  build_and_test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu
          - macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bzip2 \
            ca-certificates \
            cmake \
            curl \
            pkg-config \
            zlib1g-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      - name: Cache static libdeflate
        id: cache-libdeflate
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/libdeflate
          key: ${{ runner.os }}-${{ runner.arch }}-libdeflate-${{ env.LIBDEFLATE_VERSION }}-pic

      - name: Build static libdeflate on Linux
        if: runner.os == 'Linux' && steps.cache-libdeflate.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/ebiggers/libdeflate/releases/download/v${LIBDEFLATE_VERSION}/libdeflate-${LIBDEFLATE_VERSION}.tar.gz" -o "${RUNNER_TEMP}/libdeflate.tar.gz"
          tar -xzf "${RUNNER_TEMP}/libdeflate.tar.gz" -C "${RUNNER_TEMP}"
          cmake -S "${RUNNER_TEMP}/libdeflate-${LIBDEFLATE_VERSION}" -B "${RUNNER_TEMP}/libdeflate-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/libdeflate" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
            -DLIBDEFLATE_BUILD_GZIP=OFF \
            -DLIBDEFLATE_BUILD_TESTS=OFF
          cmake --build "${RUNNER_TEMP}/libdeflate-build" --parallel "$(nproc)"
          cmake --install "${RUNNER_TEMP}/libdeflate-build"

      - name: Build static libdeflate on macOS
        if: runner.os == 'macOS' && steps.cache-libdeflate.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/ebiggers/libdeflate/releases/download/v${LIBDEFLATE_VERSION}/libdeflate-${LIBDEFLATE_VERSION}.tar.gz" -o "${RUNNER_TEMP}/libdeflate.tar.gz"
          tar -xzf "${RUNNER_TEMP}/libdeflate.tar.gz" -C "${RUNNER_TEMP}"
          cmake -S "${RUNNER_TEMP}/libdeflate-${LIBDEFLATE_VERSION}" -B "${RUNNER_TEMP}/libdeflate-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${RUNNER_TEMP}/libdeflate" \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DLIBDEFLATE_BUILD_SHARED_LIB=OFF \
            -DLIBDEFLATE_BUILD_GZIP=OFF \
            -DLIBDEFLATE_BUILD_TESTS=OFF
          cmake --build "${RUNNER_TEMP}/libdeflate-build" --parallel "$(sysctl -n hw.ncpu)"
          cmake --install "${RUNNER_TEMP}/libdeflate-build"

      - name: Use static libdeflate
        run: |
          test -f "${RUNNER_TEMP}/libdeflate/lib/libdeflate.a"
          echo "LIBDEFLATE_PREFIX=${RUNNER_TEMP}/libdeflate" >> "${GITHUB_ENV}"
          echo "PKG_CONFIG_PATH=${RUNNER_TEMP}/libdeflate/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "${GITHUB_ENV}"

      - name: Cache static htslib
        id: cache-htslib
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/htslib
          key: ${{ runner.os }}-${{ runner.arch }}-htslib-${{ env.HTSLIB_VERSION }}-libdeflate-${{ env.LIBDEFLATE_VERSION }}-fpic

      - name: Build static htslib on Linux
        if: runner.os == 'Linux' && steps.cache-htslib.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o "${RUNNER_TEMP}/htslib.tar.bz2"
          tar -xjf "${RUNNER_TEMP}/htslib.tar.bz2" -C "${RUNNER_TEMP}"
          cd "${RUNNER_TEMP}/htslib-${HTSLIB_VERSION}"
          CFLAGS="-fPIC" \
          CPPFLAGS="-I${LIBDEFLATE_PREFIX}/include" \
          LDFLAGS="-L${LIBDEFLATE_PREFIX}/lib" \
            ./configure \
            --prefix="${RUNNER_TEMP}/htslib" \
            --disable-bz2 \
            --disable-gcs \
            --disable-libcurl \
            --disable-lzma \
            --disable-plugins \
            --disable-ref-cache \
            --disable-s3 \
            --with-libdeflate
          make -j"$(nproc)"
          make install
          rm -f "${RUNNER_TEMP}"/htslib/lib/libhts.so*

      - name: Build static htslib on macOS
        if: runner.os == 'macOS' && steps.cache-htslib.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/samtools/htslib/releases/download/${HTSLIB_VERSION}/htslib-${HTSLIB_VERSION}.tar.bz2" -o "${RUNNER_TEMP}/htslib.tar.bz2"
          tar -xjf "${RUNNER_TEMP}/htslib.tar.bz2" -C "${RUNNER_TEMP}"
          cd "${RUNNER_TEMP}/htslib-${HTSLIB_VERSION}"
          CFLAGS="-fPIC" \
          CPPFLAGS="-I${LIBDEFLATE_PREFIX}/include" \
          LDFLAGS="-L${LIBDEFLATE_PREFIX}/lib" \
            ./configure \
            --prefix="${RUNNER_TEMP}/htslib" \
            --disable-bz2 \
            --disable-gcs \
            --disable-libcurl \
            --disable-lzma \
            --disable-plugins \
            --disable-ref-cache \
            --disable-s3 \
            --with-libdeflate
          make -j"$(sysctl -n hw.ncpu)"
          make install
          rm -f "${RUNNER_TEMP}"/htslib/lib/libhts.*.dylib "${RUNNER_TEMP}"/htslib/lib/libhts.dylib

      - name: Use static htslib
        run: |
          test -f "${RUNNER_TEMP}/htslib/lib/libhts.a"
          echo "HTSDIR=${RUNNER_TEMP}/htslib" >> "${GITHUB_ENV}"
          echo "PKG_CONFIG_PATH=${RUNNER_TEMP}/htslib/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "${GITHUB_ENV}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Build project
        run: cargo build --release --locked --verbose

      - name: Check C library artifacts
        run: |
          test -f target/release/libqbix.a
          if [ "${RUNNER_OS}" = "macOS" ]; then
            test -f target/release/libqbix.dylib
            nm -gU target/release/libqbix.dylib | tee c-library-symbols.txt
            symbol_prefix=_
          else
            test -f target/release/libqbix.so
            nm -D --defined-only target/release/libqbix.so | tee c-library-symbols.txt
            symbol_prefix=
          fi
          grep " ${symbol_prefix}qbix_build_index$" c-library-symbols.txt
          grep " ${symbol_prefix}qbix_index_open$" c-library-symbols.txt
          grep " ${symbol_prefix}qbix_index_lookup$" c-library-symbols.txt
          grep " ${symbol_prefix}qbix_hits_free$" c-library-symbols.txt
          grep " ${symbol_prefix}qbix_index_close$" c-library-symbols.txt
          grep " ${symbol_prefix}qbix_last_error$" c-library-symbols.txt

      - name: Compile and run C library smoke test
        run: |
          cc -Iinclude tests/c_smoke.c -Ltarget/release -lqbix \
            -Wl,-rpath,"${PWD}/target/release" \
            -o c-smoke
          ./c-smoke

      - name: Check Linux binary linkage
        if: runner.os == 'Linux'
        run: |
          if ldd target/release/qbix > linkage.txt 2>&1; then
            cat linkage.txt
            if grep -E 'lib(hts|deflate|bz2|lzma|curl|crypto|ssl|z)\.so' linkage.txt; then
              echo "The Linux binary depends on non-portable shared libraries."
              exit 1
            fi
          else
            cat linkage.txt
            grep -Eq 'not a dynamic executable|statically linked' linkage.txt
          fi

      - name: Check macOS binary linkage
        if: runner.os == 'macOS'
        run: |
          otool -L target/release/qbix > linkage.txt
          cat linkage.txt
          if grep -E '(/usr/local|/opt/homebrew|@rpath|lib(hts|deflate))' linkage.txt; then
            echo "The macOS binary depends on non-portable shared libraries."
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Check CLI tool
        run: |
          cargo install --path . --locked
          set +e
          qbix > output.qbix 2> error.log
          status=$?
          set -e
          test "$status" -ne 0
          test -s error.log

      - name: Upload CLI smoke-test output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cli-smoke-${{ matrix.os }}
          path: |
            output.qbix
            error.log
            linkage.txt
            c-library-symbols.txt
